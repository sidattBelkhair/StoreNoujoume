<section class="container categories">
  <h1>{{ 'categories.title' | translate }}</h1>

  @if (loading()) {
    <app-loading-spinner />
  } @else if (error()) {
    <app-empty-state [message]="error()!" icon="error_outline" />
  } @else if (categories().length === 0) {
    <app-empty-state [message]="'categories.empty' | translate" />
  } @else {
    <div class="grid">
      @for (category of categories(); track category.id) {
        <app-category-card [category]="category" />
      }
    </div>
  }
</section>
