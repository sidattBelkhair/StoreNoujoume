<section class="container app-list">
  <h1>{{ 'appList.title' | translate }}</h1>

  <div class="app-list__filters">
    <input
      type="text"
      [placeholder]="'appList.searchPlaceholder' | translate"
      [(ngModel)]="search"
      (ngModelChange)="onSearchChange()"
      class="app-list__search"
    />

    <select [(ngModel)]="categoryId" (ngModelChange)="onCategoryChange()">
      <option [ngValue]="null">{{ 'appList.allCategories' | translate }}</option>
      @for (category of categories(); track category.id) {
        <option [ngValue]="category.id">{{ category.name }}</option>
      }
    </select>

    <select [(ngModel)]="sort" (ngModelChange)="onSortChange()">
      <option value="recent">{{ 'appList.sortRecent' | translate }}</option>
      <option value="downloads">{{ 'appList.sortDownloads' | translate }}</option>
      <option value="rating">{{ 'appList.sortRating' | translate }}</option>
    </select>
  </div>

  @if (loading()) {
    <app-loading-spinner />
  } @else if (error()) {
    <app-empty-state [message]="error()!" icon="error_outline" />
  } @else if (apps().length === 0) {
    <app-empty-state [message]="'appList.empty' | translate" />
  } @else {
    <div class="grid">
      @for (app of apps(); track app.id) {
        <app-app-card [app]="app" />
      }
    </div>
    <app-pagination [currentPage]="currentPage()" [lastPage]="lastPage()" (pageChange)="onPageChange($event)" />
  }
</section>
