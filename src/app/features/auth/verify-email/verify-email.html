<section class="auth">
  <form class="auth__card" (ngSubmit)="submit()">
    <h1>{{ 'verify.title' | translate }}</h1>

    @if (errorMessage()) { <p class="auth__error">{{ errorMessage() }}</p> }
    @if (infoMessage()) { <p class="auth__info">{{ infoMessage() }}</p> }

    <label>
      {{ 'auth.email' | translate }}
      <input type="email" name="email" [(ngModel)]="email" required />
    </label>

    @if (needsManualEntry()) {
      <p class="auth__info">{{ 'verify.confirmInfo' | translate }}</p>
      <label>
        {{ 'auth.fullName' | translate }}
        <input type="text" name="name" [(ngModel)]="name" required />
      </label>
      <label>
        {{ 'auth.password' | translate }}
        <input type="password" name="password" [(ngModel)]="password" required minlength="8" />
      </label>
    }

    <label>
      {{ 'verify.code' | translate }}
      <input type="text" name="code" [(ngModel)]="code" required />
    </label>

    <button type="submit" class="btn btn--primary" [disabled]="loading()">
      @if (loading()) { <span class="spinner-inline"></span> }
      {{ 'verify.btn' | translate }}
    </button>

    <button type="button" class="btn btn--outline" [disabled]="resending()" (click)="resend()">
      {{ 'verify.resend' | translate }}
    </button>

    <p class="auth__footer">
      <a routerLink="/connexion">{{ 'verify.back' | translate }}</a>
    </p>
  </form>
</section>
