<section class="auth">
  <form class="auth__card" (ngSubmit)="submit()">
    <h1>{{ 'login.title' | translate }}</h1>

    @if (errorMessage()) {
      <p class="auth__error">{{ errorMessage() }}</p>
    }

    <label>
      {{ 'auth.email' | translate }}
      <input type="email" name="email" [(ngModel)]="email" required />
    </label>

    <label>
      {{ 'auth.password' | translate }}
      <input type="password" name="password" [(ngModel)]="password" required />
    </label>

    <button type="submit" class="btn btn--primary" [disabled]="loading()">
      @if (loading()) { <span class="spinner-inline"></span> }
      {{ 'login.signIn' | translate }}
    </button>

    <p class="auth__footer">
      {{ 'login.noAccount' | translate }} <a routerLink="/inscription">{{ 'login.signUpLink' | translate }}</a>
    </p>
  </form>
</section>
