@if (loading()) {
  <app-loading-spinner />
} @else {
  <section class="container profile">
    <h1>{{ 'profile.title' | translate }}</h1>

    @if (errorMessage()) { <p class="profile__error">{{ errorMessage() }}</p> }
    @if (successMessage()) { <p class="profile__success">{{ successMessage() }}</p> }

    <form class="profile__form" (ngSubmit)="submit()">
      <label>
        {{ 'profile.photo' | translate }}
        <input type="file" accept="image/*" (change)="onAvatarSelected($event)" />
      </label>
      @if (uploadingAvatar()) { <app-loading-spinner /> }
      @if (avatarUrl) { <img [src]="avatarUrl" [alt]="'profile.photo' | translate" class="profile__avatar" /> }

      <label>
        {{ 'auth.fullName' | translate }}
        <input type="text" [(ngModel)]="name" name="name" required />
      </label>
      <label>
        {{ 'auth.phone' | translate }}
        <input type="tel" [(ngModel)]="phone" name="phone" />
      </label>
      <label>
        {{ 'auth.company' | translate }}
        <input type="text" [(ngModel)]="companyName" name="companyName" />
      </label>
      <label>
        {{ 'auth.website' | translate }}
        <input type="url" [(ngModel)]="website" name="website" />
      </label>
      <label>
        {{ 'auth.bio' | translate }}
        <textarea [(ngModel)]="bio" name="bio" rows="3"></textarea>
      </label>

      <button type="submit" class="btn btn--primary" [disabled]="saving()">
        @if (saving()) { <span class="spinner-inline"></span> }
        {{ 'profile.save' | translate }}
      </button>
    </form>

    <button type="button" class="btn btn--outline profile__logout" (click)="logout()">
      {{ 'profile.logout' | translate }}
    </button>
  </section>
}
