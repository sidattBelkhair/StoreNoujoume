<!-- Mobile / Tablet topbar -->
<header class="topbar">
  <a routerLink="/" class="topbar__brand">
    <img src="logo-transparent.png" alt="Noujoum Store" class="topbar__logo" />
  </a>
  <a routerLink="/rechercher" class="topbar__search" aria-label="Rechercher">
    <span class="material-symbols-outlined">search</span>
  </a>
</header>

<!-- Desktop sidebar -->
<aside class="sidebar">
  <a routerLink="/" class="sidebar__brand">
    <img src="logo-transparent.png" alt="Noujoum Store" class="sidebar__logo" />
    <span class="sidebar__brand-name">Noujoum Store</span>
  </a>

  <nav class="sidebar__nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="sidebar__link">
      <span class="material-symbols-outlined">home</span>
      <span>Accueil</span>
    </a>
    <a routerLink="/categories" routerLinkActive="active" class="sidebar__link">
      <span class="material-symbols-outlined">grid_view</span>
      <span>Catégories</span>
    </a>
    <a routerLink="/rechercher" routerLinkActive="active" class="sidebar__link">
      <span class="material-symbols-outlined">search</span>
      <span>Rechercher</span>
    </a>
    <a routerLink="/publier-une-app" routerLinkActive="active" class="sidebar__link">
      <span class="material-symbols-outlined">upload</span>
      <span>Publier mon App</span>
    </a>
  </nav>

  <div class="sidebar__footer">
    @if (authService.isAuthenticated()) {
      <a routerLink="/tableau-de-bord" routerLinkActive="active" class="sidebar__link">
        @if (authService.currentUser()?.avatar_url) {
          <img [src]="authService.currentUser()?.avatar_url" alt="" class="sidebar__avatar" />
        } @else {
          <span class="sidebar__avatar sidebar__avatar--placeholder">{{ authService.currentUser()?.name?.charAt(0) }}</span>
        }
        <span>Profil</span>
      </a>
      <button type="button" class="sidebar__link sidebar__logout" (click)="logout()">
        <span class="material-symbols-outlined">logout</span>
        <span>Déconnexion</span>
      </button>
    } @else {
      <a routerLink="/connexion" class="sidebar__cta">Connexion</a>
    }
  </div>
</aside>
