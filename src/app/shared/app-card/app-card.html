<a class="app-card" [routerLink]="['/apps', app().id]">
  @if (app().is_featured) {
    <span class="app-card__badge">Sponsorisé</span>
  }

  <!-- Centered app icon -->
  <div class="app-card__icon-wrap">
    @if (app().icon_url) {
      <img
        class="app-card__icon"
        [src]="resolveAssetUrl(app().icon_url)"
        [alt]="app().app_name"
      />
    } @else {
      <div class="app-card__icon-placeholder">
        {{ app().app_name.charAt(0) }}
      </div>
    }
  </div>

  <!-- Text -->
  <div class="app-card__body">
    <h3 class="app-card__name">{{ app().app_name }}</h3>
    @if (app().developer_name) {
      <p class="app-card__developer">{{ app().developer_name }}</p>
    }
    <p class="app-card__desc">{{ app().description }}</p>
  </div>
</a>
