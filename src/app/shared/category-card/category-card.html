<a class="category-card" [routerLink]="['/categories', category().id]">
  <div class="category-card__icon" [style.background-color]="category().color || null">
    @if (category().icon) {
      <span class="material-symbols-outlined">{{ category().icon }}</span>
    } @else {
      <span class="material-symbols-outlined">apps</span>
    }
  </div>
  <div class="category-card__info">
    <h3 class="category-card__name">{{ category().name }}</h3>
    <p class="category-card__count">
      {{ category().apps_count }} app{{ category().apps_count === 1 ? '' : 's' }}
    </p>
  </div>
</a>
