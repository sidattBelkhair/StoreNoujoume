@if (lastPage() > 1) {
  <nav class="pagination">
    <button type="button" class="pagination__btn" [disabled]="currentPage() === 1" (click)="goTo(currentPage() - 1)">
      Précédent
    </button>

    @for (page of pages(); track page) {
      <button
        type="button"
        class="pagination__btn"
        [class.pagination__btn--active]="page === currentPage()"
        (click)="goTo(page)"
      >
        {{ page }}
      </button>
    }

    <button type="button" class="pagination__btn" [disabled]="currentPage() === lastPage()" (click)="goTo(currentPage() + 1)">
      Suivant
    </button>
  </nav>
}
